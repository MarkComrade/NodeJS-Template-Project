<!DOCTYPE html>
<html lang="hu">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Főoldal</title>
        <!--!Bootstrap-->
        <link rel="stylesheet" href="../bootstrap/css/bootstrap.min.css" />
        <!--?Popper: dropdowns, popovers, tooltips-->
        <script src="../bootstrap/js/popper.min.js"></script>
        <script src="../bootstrap/js/bootstrap.min.js"></script>
        <!--!CSS-->
        <link rel="stylesheet" href="../css/index.css" />
        <!--!JavaScript-->
        <script src="../javascript/index.js"></script>
    </head>
    <body>
        <div class="container-fluid">
            <div class="row text-center">
                <form id="foodForm">
                    <label for="foodName">Étel neve: </label>
                    <input type="text" id="foodName" name="foodName">

                    <label for="foodPrice">Étel ára: </label>
                    <input type="text" id="foodPrice" name="foodPrice">

                    Finom

                    <input type="radio" id="foodTasteTrue" name="foodTaste">
                    <label for="foodTasteTrue">Yes king</label>

                    <input type="radio" id="foodTasteFalse" name="foodTaste">
                    <label for="foodTasteFalse">No goy</label>

                    <label for="foodExpiration">Étel lejárata: </label>
                    <input type="date" id="foodExpiration" name="foodExpiration">

                    <label for="foodQuantity">Étel mennyisége: </label>
                    <input type="number" id="foodQuantity" name="foodQuantity">
                </form>
            </div>
            <input type="button" id="submitButton" value="Submit">
        </div>

        <div class="foodTable" id="foodTable">
        </div>
    </body>
</html>
